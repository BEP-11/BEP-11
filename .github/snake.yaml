name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: BEP-11
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push output to repo
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: main
          build_dir: dist

